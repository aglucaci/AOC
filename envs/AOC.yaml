name: aoc
channels:
  - conda-forge
  - bioconda

dependencies:
  # Core
  - python=3.11
  - pip
  - snakemake=7.32.4
  - hyphy=2.5.74
  - pyyaml
  - rich
  - tn93=1.0.14

  # Bio / phylo utilities
  - biopython=1.83
  - ete3=3.1.2
  - macse
  - openjdk
  - fasttree=2.2.0

  # Data + plotting
  - numpy
  - pandas
  - matplotlib
  - statsmodels=0.14.6
  - altair=5.2.0
  - altair_saver=0.5.0
  - vl-convert-python=1.9.0

  # Testing
  - pytest
