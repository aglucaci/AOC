<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" class="marks" width="1726" height="658" viewBox="0 0 1726 658"><rect width="1726" height="658" fill="white"/><g fill="none" stroke-miterlimit="10" transform="translate(95,51)"><g class="mark-group role-frame root" role="graphics-object" aria-roledescription="group mark container"><g transform="translate(0,0)"><path class="background" aria-hidden="true" d="M0,0h980v0h-980Z"/><g><g class="mark-group role-scope concat_0_group" role="graphics-object" aria-roledescription="group mark container"><g transform="translate(0,0)"><path class="background" aria-hidden="true" d="M0.5,0.5h980v188h-980Z" stroke="#ddd"/><g><g class="mark-text role-mark concat_0_marks" role="graphics-object" aria-roledescription="text mark container"><text aria-label="order: 1; line: How to read this heatmap" role="graphics-symbol" aria-roledescription="text mark" text-anchor="start" transform="translate(490,22.75)" font-family="sans-serif" font-size="14px" fill="black">How to read this heatmap</text><text aria-label="order: 2; line: Columns are partitions; rows are HyPhy methods." role="graphics-symbol" aria-roledescription="text mark" text-anchor="start" transform="translate(490,46.25)" font-family="sans-serif" font-size="14px" fill="black">Columns are partitions; rows are HyPhy methods.</text><text aria-label="order: 3; line: Text inside each cell is the raw value reported by that method." role="graphics-symbol" aria-roledescription="text mark" text-anchor="start" transform="translate(490,69.75)" font-family="sans-serif" font-size="14px" fill="black">Text inside each cell is the raw value reported by that method.</text><text aria-label="order: 4; line: Cell color is a standardized evidence score so site counts, branch counts, RELAX k, and p-values can be scanned together." role="graphics-symbol" aria-roledescription="text mark" text-anchor="start" transform="translate(490,93.25)" font-family="sans-serif" font-size="14px" fill="black">Cell color is a standardized evidence score so site counts, branch counts, RELAX k, and p-values can be scanned together.</text><text aria-label="order: 5; line: For p-values the color score is -log10(p), so darker cells mean smaller p-values." role="graphics-symbol" aria-roledescription="text mark" text-anchor="start" transform="translate(490,116.75)" font-family="sans-serif" font-size="14px" fill="black">For p-values the color score is -log10(p), so darker cells mean smaller p-values.</text><text aria-label="order: 6; line: For FEL, MEME, aBSREL, and CFEL, darker cells mean more significant sites or branches in that partition." role="graphics-symbol" aria-roledescription="text mark" text-anchor="start" transform="translate(490,140.25)" font-family="sans-serif" font-size="14px" fill="black">For FEL, MEME, aBSREL, and CFEL, darker cells mean more significant sites or branches in that partition.</text><text aria-label="order: 7; line: For RELAX k, values above 1 suggest intensified selection and values below 1 suggest relaxation; color reflects distance from 0 on the shared score axis, not direction." role="graphics-symbol" aria-roledescription="text mark" text-anchor="start" transform="translate(490,163.75)" font-family="sans-serif" font-size="14px" fill="black">For RELAX k, values above 1 suggest intensified selection and values below 1 suggest relaxation; color reflects distance from 0 on the shared score axis, not direction.</text><text aria-label="order: 8; line: Use repeated dark cells in the same column as the strongest clue that a partition is consistently interesting across tests." role="graphics-symbol" aria-roledescription="text mark" text-anchor="start" transform="translate(490,187.25)" font-family="sans-serif" font-size="14px" fill="black">Use repeated dark cells in the same column as the strongest clue that a partition is consistently interesting across tests.</text></g></g><path class="foreground" aria-hidden="true" d="" display="none"/></g></g><g class="mark-group role-scope concat_1_group" role="graphics-object" aria-roledescription="group mark container"><g transform="translate(0,213)"><path class="background" aria-hidden="true" d="M0.5,0.5h980v360h-980Z" stroke="#ddd"/><g><g class="mark-rect role-mark concat_1_layer_0_marks" role="graphics-object" aria-roledescription="rect mark container"><path aria-label="Partition: 1; Selection test: FEL; Evidence score: 132; Method: FEL; Metric: significant_sites_FDR_0.10; Raw value: 132; Heatmap score: 132; Interpretation: Count of significant codon sites after FDR correction" role="graphics-symbol" aria-roledescription="rect mark" d="M6,180L974,180C977.311490146964,180,980,182.688509853036,980,186L980,234C980,237.311490146964,977.311490146964,240,974,240L6,240C2.688509853036,240,0,237.311490146964,0,234L0,186C0,182.688509853036,2.688509853036,180,6,180Z" fill="rgb(0, 102, 103)"/><path aria-label="Partition: 1; Selection test: MEME; Evidence score: 3; Method: MEME; Metric: significant_sites_FDR_0.10; Raw value: 3; Heatmap score: 3; Interpretation: Count of significant codon sites after FDR correction" role="graphics-symbol" aria-roledescription="rect mark" d="M6,240L974,240C977.311490146964,240,980,242.688509853036,980,246L980,294C980,297.311490146964,977.311490146964,300,974,300L6,300C2.688509853036,300,0,297.311490146964,0,294L0,246C0,242.688509853036,2.688509853036,240,6,240Z" fill="rgb(181, 221, 221)"/><path aria-label="Partition: 1; Selection test: ABSREL; Evidence score: 14; Method: ABSREL; Metric: significant_branches; Raw value: 14; Heatmap score: 14; Interpretation: Number of branches with evidence for episodic selection" role="graphics-symbol" aria-roledescription="rect mark" d="M6,0L974,0C977.311490146964,0,980,2.688509853036,980,6L980,54C980,57.311490146964,977.311490146964,60,974,60L6,60C2.688509853036,60,0,57.311490146964,0,54L0,6C0,2.688509853036,2.688509853036,0,6,0Z" fill="rgb(161, 211, 212)"/><path aria-label="Partition: 1; Selection test: BUSTEDS-MH; Evidence score: 0.301029995664; Method: BUSTEDS-MH; Metric: gene_wide_pvalue; Raw value: 0.5; Heatmap score: 0.301029995664; Interpretation: Gene-wide signal converted to -log10(p)" role="graphics-symbol" aria-roledescription="rect mark" d="M6,60L974,60C977.311490146964,60,980,62.688509853036,980,66L980,114C980,117.311490146964,977.311490146964,120,974,120L6,120C2.688509853036,120,0,117.311490146964,0,114L0,66C0,62.688509853036,2.688509853036,60,6,60Z" fill="rgb(186, 223, 223)"/><path aria-label="Partition: 1; Selection test: RELAX; Evidence score: 0; Method: RELAX; Metric: status; Raw value: skipped; Heatmap score: 0; Interpretation: Skipped analysis" role="graphics-symbol" aria-roledescription="rect mark" d="M6,300L974,300C977.311490146964,300,980,302.688509853036,980,306L980,354C980,357.311490146964,977.311490146964,360,974,360L6,360C2.688509853036,360,0,357.311490146964,0,354L0,306C0,302.688509853036,2.688509853036,300,6,300Z" fill="rgb(187, 223, 223)"/><path aria-label="Partition: 1; Selection test: CFEL; Evidence score: 0; Method: CFEL; Metric: status; Raw value: skipped; Heatmap score: 0; Interpretation: Skipped analysis" role="graphics-symbol" aria-roledescription="rect mark" d="M6,120L974,120C977.311490146964,120,980,122.688509853036,980,126L980,174C980,177.311490146964,977.311490146964,180,974,180L6,180C2.688509853036,180,0,177.311490146964,0,174L0,126C0,122.688509853036,2.688509853036,120,6,120Z" fill="rgb(187, 223, 223)"/></g><g class="mark-text role-mark concat_1_layer_1_marks" role="graphics-object" aria-roledescription="text mark container"><text aria-label="partition: 1; method: FEL; value: 132" role="graphics-symbol" aria-roledescription="text mark" text-anchor="middle" transform="translate(490,214)" font-family="sans-serif" font-size="12px" font-weight="bold" fill="#0f172a">132</text><text aria-label="partition: 1; method: MEME; value: 3" role="graphics-symbol" aria-roledescription="text mark" text-anchor="middle" transform="translate(490,274)" font-family="sans-serif" font-size="12px" font-weight="bold" fill="#0f172a">3</text><text aria-label="partition: 1; method: ABSREL; value: 14" role="graphics-symbol" aria-roledescription="text mark" text-anchor="middle" transform="translate(490,34)" font-family="sans-serif" font-size="12px" font-weight="bold" fill="#0f172a">14</text><text aria-label="partition: 1; method: BUSTEDS-MH; value: 0.5" role="graphics-symbol" aria-roledescription="text mark" text-anchor="middle" transform="translate(490,94)" font-family="sans-serif" font-size="12px" font-weight="bold" fill="#0f172a">0.5</text><text aria-label="partition: 1; method: RELAX; value: skipped" role="graphics-symbol" aria-roledescription="text mark" text-anchor="middle" transform="translate(490,334)" font-family="sans-serif" font-size="12px" font-weight="bold" fill="#0f172a">skipped</text><text aria-label="partition: 1; method: CFEL; value: skipped" role="graphics-symbol" aria-roledescription="text mark" text-anchor="middle" transform="translate(490,154)" font-family="sans-serif" font-size="12px" font-weight="bold" fill="#0f172a">skipped</text></g><g class="mark-group role-axis" role="graphics-symbol" aria-roledescription="axis" aria-label="X-axis titled 'Partition' for a discrete scale with 1 value: 1"><g transform="translate(0.5,360.5)"><path class="background" aria-hidden="true" d="M0,0h0v0h0Z" pointer-events="none"/><g><g class="mark-rule role-axis-tick" pointer-events="none"><line transform="translate(490,0)" x2="0" y2="5" stroke="#888" stroke-width="1" opacity="1"/></g><g class="mark-text role-axis-label" pointer-events="none"><text text-anchor="end" transform="translate(489.5,7) rotate(270) translate(0,3)" font-family="sans-serif" font-size="10px" fill="#000" opacity="1">1</text></g><g class="mark-rule role-axis-domain" pointer-events="none"><line transform="translate(0,0)" x2="980" y2="0" stroke="#888" stroke-width="1" opacity="1"/></g><g class="mark-text role-axis-title" point